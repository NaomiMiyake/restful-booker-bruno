info:
  name: API-014 Update nonexistent booking
  type: http
  seq: 2

http:
  method: PUT
  url: "{{baseurl}}/booking/999999999"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
    - name: Cookie
      value: token={{token}};
  body:
    type: json
    data: |-
      {
        "firstname": "Updated",
        "lastname": "Booking",
        "totalprice": 222,
        "depositpaid": false,
        "bookingdates": {
          "checkin": "2026-08-01",
          "checkout": "2026-08-10"
        },
        "additionalneeds": "Dinner"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status is 405", function () {
          expect(res.status).to.equal(405);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
