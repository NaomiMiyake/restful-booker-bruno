info:
  name: API-013 Reject auth with invalid credentials
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseurl}}/auth"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "{{invalidUsername}}",
        "password": "{{invalidPassword}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("status is 200", function () {
            expect(res.status).to.equal(200);
        });

        test("authentication failed", function () {
            expect(body.reason).to.equal("Bad credentials");
        });

        test("token is not returned", function () {
            expect(body).to.not.have.property("token");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
