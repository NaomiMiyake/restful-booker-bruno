info:
  name: API-011 Reject partial update without authentication (PATCH)
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseurl}}/booking/{{bookingId}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstname": "Updated"
      }
  auth: inherit

runtime:
