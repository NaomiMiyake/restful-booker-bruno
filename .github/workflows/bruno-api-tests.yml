name: Bruno API Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno API tests
        run: bru run . --env dev
