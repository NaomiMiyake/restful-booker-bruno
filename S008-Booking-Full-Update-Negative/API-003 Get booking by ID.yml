info:
  name: API-003 Get booking by ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseurl}}/booking/{{bookingId}}"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("status is 200", function () {
          expect(res.status).to.equal(200);
        });

        test("booking exists", function () {
            expect(body).to.be.an("object");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
