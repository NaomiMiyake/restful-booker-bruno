      value: application/json
  body:
    type: json
    data: |-
      {
        "firstname": "Updated",
        "lastname": "Booking",
        "totalprice": 222,
        "depositpaid": false,
        "bookingdates": {
          "checkin": "2026-08-01",
          "checkout": "2026-08-10"
